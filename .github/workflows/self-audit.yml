name: self-audit

# Dogfooding: the kit runs its own scans on this repo. A green badge means
# security-audit-kit passes its own secret + SAST gates. SARIF is uploaded to GitHub
# code scanning (Security tab) so findings have a real, versioned home — not a committed
# markdown dump. The weekly schedule also catches newly-disclosed issues in pinned tools.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required to upload SARIF to code scanning

jobs:
  self-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # gitleaks detect scans full history
      - uses: astral-sh/setup-uv@v8.2.0   # provides uvx for semgrep (pinned in scan.sh)
        with:
          enable-cache: false   # no uv lockfile in this repo; avoids a useless-cache warning
      - name: doctor
        run: bash scan.sh doctor
      - name: secret scan (gitleaks, pinned by digest) + SARIF
        run: SARIF=1 bash scan.sh secret
      - name: SAST (semgrep, pinned by version) + SARIF
        if: always()   # run even if the secret gate failed, so both SARIFs exist
        run: SARIF=1 bash scan.sh sast
      - name: upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: docs/security/scan-findings/sarif
