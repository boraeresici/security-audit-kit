name: self-audit

# Dogfooding: the kit runs its own scans on this repo. A green badge means
# security-audit-kit passes its own secret + SAST gates. The weekly schedule also
# catches newly-disclosed issues in our pinned tools without a code change.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC
  workflow_dispatch:

jobs:
  self-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks detect scans full history
      - uses: astral-sh/setup-uv@v5   # provides uvx for semgrep (pinned in scan.sh)
      - name: doctor
        run: bash scan.sh doctor
      - name: secret scan (gitleaks, pinned by digest)
        run: bash scan.sh secret
      - name: SAST (semgrep, pinned by version)
        run: bash scan.sh sast
