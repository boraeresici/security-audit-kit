name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: shellcheck (pinned image — no version drift; uses repo .shellcheckrc)
        run: |
          docker run --rm -v "$PWD:/mnt" -w /mnt koalaman/shellcheck:v0.10.0 \
            scan.sh install.sh bootstrap.sh hooks/pre-commit hooks/pre-push
